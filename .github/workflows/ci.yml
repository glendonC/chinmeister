name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-worker:
    name: Test Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      # Worker tests run in the workerd runtime via @cloudflare/vitest-pool-workers.
      # V8 coverage is not supported in workerd (no node:inspector/promises).
      - run: npm run test:worker

  test-mcp:
    name: Test MCP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm run test:coverage:mcp
      - name: Upload MCP coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-mcp
          path: packages/mcp/coverage/
          retention-days: 7

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm run test:coverage:cli
      - name: Upload CLI coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-cli
          path: packages/cli/coverage/
          retention-days: 7

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm ci --prefix packages/web
      - run: npm run test:coverage:web
      - name: Upload web coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-web
          path: packages/web/coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/web/package-lock.json
      - run: npm ci
      - run: npm ci --prefix packages/web
      - run: cd packages/cli && npm run build
      - run: npm run build --prefix packages/web
      - run: cd packages/worker && npx wrangler deploy --dry-run
